version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing dependencies..."
      - pip install -r requirements.txt
      - echo "Installing SonarScanner CLI..."
      - curl -sSLo sonar-scanner.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
      - unzip sonar-scanner.zip
      - mv sonar-scanner-* sonar-scanner
      - export PATH=$PATH:$(pwd)/sonar-scanner/bin

  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - aws --version
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 026090546401.dkr.ecr.us-east-1.amazonaws.com
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - echo "Image Tag: $IMAGE_TAG"
      - REPO_URI=026090546401.dkr.ecr.us-east-1.amazonaws.com/ecommerce-flask

  build:
    commands:
      - echo "Build started on $(date)"
      - echo "Running SonarQube analysis..."
      - sonar-scanner -Dsonar.projectKey=E-commerce -Dsonar.sources=. -Dsonar.host.url=http://3.87.198.49 -Dsonar.login=sqp_03cf9b6a7c2243b636278204866434d8a5ff8337
      - echo "Building Docker image..."
      - docker build -t ${REPO_URI}:${IMAGE_TAG} .
      - docker tag ${REPO_URI}:${IMAGE_TAG} ${REPO_URI}:latest

  post_build:
    commands:
      - echo "Build completed on $(date)"
      - docker push ${REPO_URI}:${IMAGE_TAG}
      - docker push ${REPO_URI}:latest
      - echo "Updating Kubernetes deployment..."
      - sed -i "s|image: .*|image: ${REPO_URI}:${IMAGE_TAG}|" k8s/deployment.yaml
      - aws eks update-kubeconfig --region us-east-1 --name ecommerce-cluster
      - kubectl apply -f k8s/

artifacts:
  files:
    - k8s/*
