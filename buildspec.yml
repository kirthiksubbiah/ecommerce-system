version: 0.2

env:
  variables:
    REGION: us-east-1
    ACCOUNT_ID: 026090546401
    REPO_NAME: ecommerce-flask
    CLUSTER_NAME: ecommerce-cluster
    SONAR_PROJECT_KEY: E-commerce
    SONAR_HOST_URL: http://3.87.198.49
    SONAR_TOKEN: sqp_03cf9b6a7c2243b636278204866434d8a5ff8337

phases:
  install:
    commands:
      - echo Installing SonarScanner CLI...
      - curl -sSLo sonar-scanner.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
      - unzip sonar-scanner.zip
      - mv sonar-scanner-* sonar-scanner
      - export PATH=$PATH:$(pwd)/sonar-scanner/bin

  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin ${ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com
      - IMAGE_TAG=latest
      - ECR_REPO=${ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com/${REPO_NAME}

  build:
    commands:
      - echo Building the project with Maven...
      - mvn clean package
      - echo Running SonarQube scan...
      - sonar-scanner -Dsonar.projectKey=${SONAR_PROJECT_KEY} -Dsonar.sources=. -Dsonar.host.url=${SONAR_HOST_URL} -Dsonar.login=${SONAR_TOKEN} -Dsonar.java.binaries=target/classes
      - echo Building Docker image...
      - docker build -t $ECR_REPO:$IMAGE_TAG .

  post_build:
    commands:
      - echo Pushing Docker image to ECR...
      - docker push $ECR_REPO:$IMAGE_TAG
      - echo Updating Kubernetes manifests with image tag...
      - sed -i "s|image: .*|image: ${ECR_REPO}:${IMAGE_TAG}|" k8s/deployment.yaml
      - echo Updating EKS kubeconfig...
      - aws eks update-kubeconfig --region $REGION --name $CLUSTER_NAME
      - echo Applying manifests to cluster...
      - kubectl apply -f k8s/

artifacts:
  files:
    - k8s/*
